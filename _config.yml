# Site settings
title: "Jekyll Resume Template"
description: "A resume template for Jekyll and GitHub Pages sites."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "true"
resume_name:                    "Jeongseo Jang"
resume_title:                   "M.S. Researcher in Mechanical Engineering"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "tj6774@gmail.com"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone:       "+82)10-9182-6774"
resume_contact_address:         "25-20 Sanho-daero 25-gil, Gumi-si, Gyeongsangbuk-do"

resume_header_contact_info:     "25-20 Sanho-daero 25-gil, Gumi-si, Gyeongsangbuk-do • +82)10-9182-6774 • tj6774@gmail.com"
display_header_contact_info:    "false"

resume_header_intro: "<p>I am an M.S. researcher in Mechanical Engineering at Kumoh National Institute of Technology 🎓 <br><br> My research interests focus on wearable robotics, including exoskeletons and exosuits for assistive and rehabilitation systems 💡 <br><br> I develop robotic systems by connecting ROS-based software, reinforcement learning, physics-based simulation, and control algorithms for robots, autonomous vehicles, and intelligent braking systems 🦾🤖🦿🤝⚙️🔧 <br><br></p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_education:       true
resume_section_projects:        true
resume_section_skills:          true
resume_section_recognition:     true
resume_section_links:           true
# resume_section_associations:    true
resume_section_interests:       true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url:            "https://github.com/JEONGSE0"
  # resume_twitter_url:           "http://twitter.com/jglovier"
  # resume_dribbble_url:          "https://dribbble.com/jag"
  # resume_facebook_url:          "insert Facebook URL here"
  resume_linkedin_url:          "https://www.linkedin.com/in/jeongseo-jang-839211300/"
  # resume_instagram_url:         "insert your Instagram URL here"
  resume_website_url:           "https://jeongse0.github.io/"
  # resume_medium_url:            "https://medium.com/@jglovier"
resume_print_social_links:      true

# Design settings
resume_theme:                   default

